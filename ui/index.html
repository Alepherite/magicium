<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Converter</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; margin: 0; }
        #drop-zone { width: 300px; height: 200px; border: 2px dashed #aaa; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: white; cursor: pointer; position: relative; overflow: hidden; }
        #drop-zone.dragover { border-color: #007bff; background: #e7f1ff; }
        #preview { max-width: 100%; max-height: 100%; display: none; pointer-events: none; }
        #status { margin-top: 12px; min-height: 1.2em; font-size: 0.95em; color: #2c7a2c; }
        #status.error { color: #b00020; }
    </style>
</head>
<body>
    <div id="drop-zone">
        <div id="drop-text">Drop image here</div>
        <img id="preview" />
    </div>
    <select id="format">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WEBP</option>
        <option value="bmp">BMP</option>
    </select>
    <button id="convert-btn">Convert & Save</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');
        let currentFileBase64 = null;
        let currentSourcePath = null;

        function setStatus(message, isError = false) {
            status.textContent = message;
            status.classList.toggle('error', isError);
        }

        function setImageFromDataUrl(dataUrl, sourcePath) {
            currentFileBase64 = dataUrl.split(',')[1];
            currentSourcePath = sourcePath || null;
            preview.src = dataUrl;
            preview.style.display = 'block';
            document.getElementById('drop-text').style.display = 'none';
            setStatus('Image loaded and ready to convert.');
        }

        window.setImageFromDataUrl = setImageFromDataUrl;

        window.__handleSaveResponse = function(responseJson) {
            const response = typeof responseJson === 'string' ? JSON.parse(responseJson) : responseJson;
            if (response.status === 'success') {
                setStatus('Saved to ' + response.file);
            } else {
                setStatus('Error saving image.', true);
            }
        };

        window.nativeSaveImage = function(payload) {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.save_converted_image) {
                window.webkit.messageHandlers.save_converted_image.postMessage(payload);
                return;
            }
            setStatus('Native bridge unavailable.', true);
        };

        window.requestImageSelection = function() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.select_image) {
                window.webkit.messageHandlers.select_image.postMessage('');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentFileBase64 = ev.target.result.split(',')[1];
                    currentSourcePath = null;
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                    document.getElementById('drop-text').style.display = 'none';
                    setStatus('Image loaded and ready to convert.');
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        dropZone.onclick = () => {
            window.requestImageSelection();
        };

        document.getElementById('convert-btn').onclick = () => {
            if (!currentFileBase64) {
                setStatus('Please select or drop an image first.', true);
                return;
            }
            const format = document.getElementById('format').value;
            const payload = format + ',' + currentFileBase64 + ',' + encodeURIComponent(currentSourcePath || '');
            window.nativeSaveImage(payload);
        };
    </script>
</body>
</html>
