<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magicium Converter</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #e5e7eb;
            --status-text: #2c7a2c;
            --error-text: #b00020;
        }

        body.dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-color: #ffffff;
            --accent-color: #a5b4fc;
            --accent-hover: #6366f1;
            --border-color: #374151;
            --status-text: #4ade80;
            --error-text: #fb7185;
        }

        body.sunset {
            --bg-color: #fff1f2;
            --card-bg: #ffffff;
            --text-color: #881337;
            --accent-color: #e11d48;
            --accent-hover: #be123c;
            --border-color: #fda4af;
            --status-text: #9f1239;
            --error-text: #e11d48;
        }

        /* [NEW THEMES ADDED BELOW] */
        body.nord {
            --bg-color: #d8dee9;
            --card-bg: #e5e9f0;
            --text-color: #2e3440;
            --accent-color: #88c0d0;
            --accent-hover: #81a1c1;
            --border-color: #ccd0d9;
            --status-text: #a3be8c;
            --error-text: #bf616a;
        }

        body.cyberpunk {
            --bg-color: #0d0e15;
            --card-bg: #1a1c29;
            --text-color: #00ffcc;
            --accent-color: #ff007f;
            --accent-hover: #d40066;
            --border-color: #ff007f88;
            --status-text: #39ff14;
            --error-text: #ff3333;
        }

        body.forest {
            --bg-color: #f1f3f0;
            --card-bg: #ffffff;
            --text-color: #2d3a2e;
            --accent-color: #1b4d3e;
            --accent-hover: #143d31;
            --border-color: #c2d5c6;
            --status-text: #2e6f40;
            --error-text: #a83232;
        }

        body.sakura {
            --bg-color: #fff0f3;
            --card-bg: #ffffff;
            --text-color: #5c3d46;
            --accent-color: #ffb3c1;
            --accent-hover: #ff8fa3;
            --border-color: #ffe5ec;
            --status-text: #c9184a;
            --error-text: #ff4d6d;
        }

        body.matrix {
            --bg-color: #030704;
            --card-bg: #0d120f;
            --text-color: #00ff41;
            --accent-color: #008f11;
            --accent-hover: #00ff41;
            --border-color: #00ff4144;
            --status-text: #00ff41;
            --error-text: #ff0000;
        }
        /* [END OF NEW THEMES] */

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
            background: var(--bg-color); color: var(--text-color);
            transition: all 0.3s ease;
        }

        .controls-top { margin-bottom: 20px; }

        #drop-zone { 
            width: 320px; height: 220px; border: 2px dashed var(--border-color); 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 20px; background: var(--card-bg); cursor: pointer; 
            position: relative; overflow: hidden; border-radius: 16px;
            transition: transform 0.2s, border-color 0.2s;
        }
        #drop-zone:hover { transform: scale(1.02); border-color: var(--accent-color); }
        #drop-zone.dragover { border-color: var(--accent-color); background: var(--accent-color)20; }
        #preview { max-width: 90%; max-height: 90%; display: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .action-area { display: flex; gap: 10px; align-items: center; }
        
        select, button {
            padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-color); font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }

        body.dark select {
            background: #e0e0e0; /* Lighter background for better contrast */
            color: #1a1a1a;    /* Darker text for better contrast */
            border-color: #555;
        }

        /* [ADDED DROPDOWN STYLING FOR EXTREME DARK THEMES] */
        body.cyberpunk select,
        body.matrix select {
            background: #2a2a2a;
            color: #00ffcc;
            border-color: var(--border-color);
        }
        body.matrix select {
            color: #00ff41;
        }

        button { background: var(--accent-color); color: white; font-weight: 600; border: none; }
        button:hover { background: var(--accent-hover); }

        #status { margin-top: 16px; font-weight: 500; color: var(--status-text); }
        #status.error { color: var(--error-text); }
    </style>
</head>
<body>
    <div class="controls-top">
        <label for="theme">Theme: </label>
        <select id="theme" onchange="document.body.className = this.value">
            <option value="">Default</option>
            <option value="dark">Dark Mode</option>
            <option value="sunset">Sunset</option>
            <!-- [NEW THEME OPTIONS ADDED BELOW] -->
            <option value="nord">Nord (Frost)</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="forest">Forest</option>
            <option value="sakura">Sakura</option>
            <option value="matrix">Matrix</option>
        </select>
    </div>

    <div id="drop-zone">
        <div id="drop-text">Drag or click to add image</div>
        <img id="preview" />
    </div>

    <div class="action-area">
        <select id="format">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WEBP</option>
            <option value="bmp">BMP</option>
        </select>
        <button id="convert-btn">Convert & Save</button>
    </div>
    
    <div id="status" role="status" aria-live="polite"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');
        let currentFileBase64 = null;
        let currentSourcePath = null;

        function setStatus(message, isError = false) {
            status.textContent = message;
            status.classList.toggle('error', isError);
        }

        window.setImageFromDataUrl = (dataUrl, sourcePath) => {
            currentFileBase64 = dataUrl.split(',')[1];
            currentSourcePath = sourcePath || null;
            preview.src = dataUrl;
            preview.style.display = 'block';
            document.getElementById('drop-text').style.display = 'none';
            setStatus('Ready to convert.');
        };

        window.__handleSaveResponse = (responseJson) => {
            const response = typeof responseJson === 'string' ? JSON.parse(responseJson) : responseJson;
            setStatus(response.status === 'success' ? 'Saved successfully!' : 'Error saving image.', response.status !== 'success');
        };

        window.requestImageSelection = () => {
            if (window.webkit?.messageHandlers?.select_image) {
                window.webkit.messageHandlers.select_image.postMessage('');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => window.setImageFromDataUrl(ev.target.result);
                reader.readAsDataURL(file);
            };
            input.click();
        };

        dropZone.onclick = window.requestImageSelection;
        document.getElementById('convert-btn').onclick = () => {
            if (!currentFileBase64) return setStatus('Select an image first.', true);
            const format = document.getElementById('format').value;
            const payload = `${format},${currentFileBase64},${encodeURIComponent(currentSourcePath || '')}`;
            window.webkit?.messageHandlers?.save_converted_image?.postMessage(payload) ?? setStatus('Bridge unavailable.', true);
        };
    </script>
</body>
</html>
